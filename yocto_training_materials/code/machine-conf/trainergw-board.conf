#@TYPE: Machine
#@NAME: TrainerGW reference board
#@DESCRIPTION: Example machine config for a Cortex-A72 based IoT gateway.
#              Use as a template; real values come from your SoC reference manual.

# --- CPU tuning ---
# Pull in the standard tune file for the SoC core.
require conf/machine/include/arm/armv8a/tune-cortexa72.inc

# --- Kernel and bootloader providers ---
PREFERRED_PROVIDER_virtual/kernel ?= "linux-yocto"
PREFERRED_PROVIDER_virtual/bootloader ?= "u-boot"
PREFERRED_PROVIDER_u-boot ?= "u-boot"

# --- Kernel image type and device tree ---
KERNEL_IMAGETYPE = "Image"
KERNEL_DEVICETREE = "trainergw/trainergw-board.dtb"

# --- What this hardware can do (drives recipe/package decisions) ---
MACHINE_FEATURES = "usbhost ethernet wifi bluetooth alsa rtc"

# --- Serial console ---
SERIAL_CONSOLES = "115200;ttyS0"

# --- Kernel command line additions ---
APPEND += "root=/dev/mmcblk0p2 rootwait console=ttyS0,115200 ro"

# --- Image / flashing ---
IMAGE_FSTYPES += "wic.bz2 wic.bmap"
WKS_FILE = "trainergw-sdimage.wks"

# --- Bootloader machine config (u-boot defconfig name) ---
UBOOT_MACHINE = "trainergw_defconfig"

# --- Extra firmware/initramfs knobs (example) ---
MACHINE_EXTRA_RRECOMMENDS += "kernel-modules"

# ============================================================================
# Core dump capture (D4S3 / D4S4)
# Drop-in for /etc/systemd/coredump.conf
# ============================================================================

[Coredump]
# Store crash cores externally (in /var/lib/systemd/coredump), compressed.
Storage=external
Compress=yes

# Size caps so a crashing loop can't fill the disk.
ProcessSizeMax=1G
ExternalSizeMax=1G
MaxUse=500M
KeepFree=200M

# Inspect crashes with:  coredumpctl list / info <pid> / gdb <pid>

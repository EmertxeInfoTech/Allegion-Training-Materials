# nginx config to serve a shared sstate + downloads mirror (D2S6)
# Place at: /etc/nginx/conf.d/yocto-mirror.conf on the build server.

server {
    listen 80;
    server_name build.company.local;

    # Shared state cache
    location /sstate/ {
        alias /srv/yocto/sstate-cache/;
        autoindex on;
    }

    # Source downloads mirror
    location /downloads/ {
        alias /srv/yocto/downloads/;
        autoindex on;
    }
}

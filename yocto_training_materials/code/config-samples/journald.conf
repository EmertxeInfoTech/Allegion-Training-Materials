# ============================================================================
# Persistent, bounded journald config (D4S3)
# Drop-in for /etc/systemd/journald.conf.
# Makes logs survive reboots (vital for field debugging) while capping size so
# they never wear out or fill the flash.
# ============================================================================

[Journal]
# Store logs on disk (default on embedded is often volatile/RAM only).
Storage=persistent

# Cap total journal size on disk.
SystemMaxUse=200M
SystemKeepFree=100M

# Cap individual file size and rotation age.
SystemMaxFileSize=20M
MaxFileSec=1week

# Forward to console for early-boot visibility (optional).
ForwardToConsole=no

# Compress large entries.
Compress=yes

# Rate limiting: don't let a chatty service drown everything else.
RateLimitIntervalSec=30s
RateLimitBurst=1000

# Remember to:  mkdir -p /var/log/journal && systemctl restart systemd-journald

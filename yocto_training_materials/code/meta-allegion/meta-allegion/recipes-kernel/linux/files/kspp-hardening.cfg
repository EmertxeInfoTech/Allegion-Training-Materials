# KSPP (Kernel Self Protection Project) hardening fragment
# Applied on top of the machine defconfig.
# See the KSPP Kernel Hardening study guide for what each does.

# --- Stack protection ---
CONFIG_STACKPROTECTOR=y
CONFIG_STACKPROTECTOR_STRONG=y

# --- Memory initialization ---
CONFIG_INIT_ON_ALLOC_DEFAULT_ON=y
CONFIG_INIT_STACK_ALL_ZERO=y

# --- Code/data protection ---
CONFIG_STRICT_KERNEL_RWX=y
CONFIG_STRICT_MODULE_RWX=y

# --- KASLR ---
CONFIG_RANDOMIZE_BASE=y

# --- Restrict kernel info exposure ---
CONFIG_SECURITY_DMESG_RESTRICT=y
CONFIG_STRICT_DEVMEM=y
CONFIG_IO_STRICT_DEVMEM=y

# --- Hardened usercopy and FORTIFY ---
CONFIG_HARDENED_USERCOPY=y
CONFIG_FORTIFY_SOURCE=y

# --- Seccomp (needed for systemd SystemCallFilter) ---
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# --- Disable dangerous legacy features ---
# CONFIG_DEVKMEM is not set
# CONFIG_PROC_KCORE is not set
# CONFIG_LEGACY_PTYS is not set

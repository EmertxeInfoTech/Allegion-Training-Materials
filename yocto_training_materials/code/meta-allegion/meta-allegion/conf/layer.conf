# Layer configuration for meta-allegion

# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "allegion"
BBFILE_PATTERN_allegion = "^${LAYERDIR}/"
BBFILE_PRIORITY_allegion = "10"

# This layer supports these Yocto releases
LAYERSERIES_COMPAT_allegion = "kirkstone scarthgap"

# Layers this one depends on
LAYERDEPENDS_allegion = "core"

# Tell BitBake where machine configs live
BBFILES += "${LAYERDIR}/conf/machine/*.conf"

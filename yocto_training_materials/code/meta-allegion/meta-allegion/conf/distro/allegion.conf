# Allegion custom distribution configuration

# Build on top of poky as a base
require conf/distro/poky.conf

# Distro identity
DISTRO = "allegion"
DISTRO_NAME = "Allegion Embedded Linux"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "controller"
MAINTAINER = "Allegion Embedded Team <embedded@example.com>"

# Pull in the systemd configuration fragment
require conf/distro/include/allegion-systemd.inc

# Pull in security hardening defaults
require conf/distro/include/allegion-security.inc

# --- Package format ---
# rpm is the default; ipk is lighter for embedded
PACKAGE_CLASSES ?= "package_ipk"

# --- Distro features ---
# Remove features we don't need on a headless security device
DISTRO_FEATURES:remove = "x11 wayland opengl vulkan"

# Add features we want
DISTRO_FEATURES:append = " pam seccomp"

# --- SDK information ---
SDK_VENDOR = "-allegionsdk"
SDK_VERSION = "${@d.getVar('DISTRO_VERSION').replace('snapshot-${METADATA_REVISION}', 'snapshot')}"

# --- Build provenance ---
# Record what went into every build
INHERIT += "buildhistory"
BUILDHISTORY_COMMIT = "1"

# --- Reproducibility ---
# Bake a clean version string into the image
DISTRO_VERSION[vardepsexclude] = "DATE"

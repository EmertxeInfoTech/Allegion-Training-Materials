# features.cfg  (D2S4)
# Hardware / driver features we want enabled in the kernel for TrainerGW.
# Each line is a Kconfig symbol. 'y' = built-in, 'm' = module.

# USB-serial adapters commonly used on gateways
CONFIG_USB_SERIAL=y
CONFIG_USB_SERIAL_FTDI_SIO=y
CONFIG_USB_SERIAL_CP210X=y

# I2C device access from userspace (sensors, RTCs)
CONFIG_I2C_CHARDEV=y

# GPIO access from userspace (legacy sysfs + modern chardev)
CONFIG_GPIO_SYSFS=y
CONFIG_GPIO_CDEV=y

# Watchdog support (used in the Day 4 maintenance discussion)
CONFIG_WATCHDOG=y
CONFIG_WATCHDOG_CORE=y

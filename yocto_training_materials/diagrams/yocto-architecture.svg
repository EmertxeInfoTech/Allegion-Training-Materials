<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#CC0066"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#663399"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#CC0066"/><stop offset="1" stop-color="#663399"/></linearGradient></defs><rect width="900" height="500" fill="#FFFFFF"/><text x="40" y="45" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#CC0066">Yocto Architecture</text><text x="40" y="70" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">How the pieces fit: layers feed BitBake, which produces a bootable image.</text><rect x="40" y="110" width="230" height="50" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="155.0" y="131.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#CC0066">meta-yourproduct</text><text x="155.0" y="149.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">your apps, image</text><rect x="40" y="168" width="230" height="50" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="155.0" y="189.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#663399">meta-yourbsp</text><text x="155.0" y="207.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">hardware enablement</text><rect x="40" y="226" width="230" height="50" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="155.0" y="247.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#CC0066">meta-openembedded</text><text x="155.0" y="265.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">community recipes</text><rect x="40" y="284" width="230" height="50" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="155.0" y="305.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#663399">meta (OE-Core)</text><text x="155.0" y="323.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">shared recipes</text><text x="155" y="360" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#666666">Metadata layers (stack)</text><rect x="40" y="400" width="230" height="60" rx="8" fill="#F5F5F5" stroke="#666666" stroke-width="2"/><text x="155.0" y="426.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">local.conf / bblayers.conf</text><text x="155.0" y="444.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#666666">MACHINE, DISTRO, layers</text><rect x="360" y="200" width="200" height="120" rx="8" fill="url(#brand)" stroke="#663399" stroke-width="2"/><text x="460.0" y="265.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">BitBake</text><text x="460" y="295" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#FFFFFF">parse → plan → execute</text><text x="460" y="345" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">task graph + sstate cache</text><line x1="270" y1="220" x2="355" y2="235" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="270" y1="250" x2="355" y2="250" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="270" y1="300" x2="355" y2="270" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="270" y1="430" x2="355" y2="300" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="650" y="150" width="210" height="50" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="755.0" y="180.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#CC0066">Kernel + DTB</text><rect x="650" y="215" width="210" height="50" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="755.0" y="245.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#663399">Root filesystem</text><rect x="650" y="280" width="210" height="50" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="755.0" y="310.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#CC0066">Bootloader</text><rect x="650" y="360" width="210" height="60" rx="8" fill="url(#brand)" stroke="#663399" stroke-width="2"/><text x="755.0" y="386.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Bootable image (.wic)</text><text x="755.0" y="404.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">tmp/deploy/images/</text><line x1="560" y1="235" x2="645" y2="180" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="560" y1="255" x2="645" y2="240" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="560" y1="275" x2="645" y2="305" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="560" y1="300" x2="645" y2="385" stroke="#663399" stroke-width="3" marker-end="url(#ah)"/><text x="450" y="470" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">Poky = BitBake + OE-Core + reference distro (meta-poky) + reference BSP (meta-yocto-bsp)</text></svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#CC0066"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#663399"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#CC0066"/><stop offset="1" stop-color="#663399"/></linearGradient></defs><rect width="900" height="540" fill="#FFFFFF"/><text x="40" y="45" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#CC0066">Networking Field Diagnostics</text><text x="40" y="70" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">Work down the ladder. Stop at the first step that fails — that's your problem.</text><rect x="40" y="110" width="250" height="56" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="165.0" y="134.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">Have an IP?</text><text x="165.0" y="152.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">ip addr show</text><rect x="330" y="118" width="500" height="40" rx="6" fill="#F5F5F5" stroke="#666666" stroke-width="1"/><text x="345" y="143" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">No → DHCP not running or no lease</text><line x1="290" y1="138" x2="326" y2="138" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="165" y1="166" x2="165" y2="186" stroke="#663399" stroke-width="2" marker-end="url(#ah)"/><rect x="40" y="186" width="250" height="56" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="165.0" y="210.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">Have a route?</text><text x="165.0" y="228.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">ip route show</text><rect x="330" y="194" width="500" height="40" rx="6" fill="#F5F5F5" stroke="#666666" stroke-width="1"/><text x="345" y="219" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">No → default gateway missing</text><line x1="290" y1="214" x2="326" y2="214" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="165" y1="242" x2="165" y2="262" stroke="#663399" stroke-width="2" marker-end="url(#ah)"/><rect x="40" y="262" width="250" height="56" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="165.0" y="286.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">Gateway reachable?</text><text x="165.0" y="304.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">ping &lt;gateway&gt;</text><rect x="330" y="270" width="500" height="40" rx="6" fill="#F5F5F5" stroke="#666666" stroke-width="1"/><text x="345" y="295" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">No → link / L2 problem</text><line x1="290" y1="290" x2="326" y2="290" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="165" y1="318" x2="165" y2="338" stroke="#663399" stroke-width="2" marker-end="url(#ah)"/><rect x="40" y="338" width="250" height="56" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="165.0" y="362.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">Internet reachable?</text><text x="165.0" y="380.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">ping 8.8.8.8</text><rect x="330" y="346" width="500" height="40" rx="6" fill="#F5F5F5" stroke="#666666" stroke-width="1"/><text x="345" y="371" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">No → routing / firewall upstream</text><line x1="290" y1="366" x2="326" y2="366" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><line x1="165" y1="394" x2="165" y2="414" stroke="#663399" stroke-width="2" marker-end="url(#ah)"/><rect x="40" y="414" width="250" height="56" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="165.0" y="438.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#333333">DNS works?</text><text x="165.0" y="456.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12" fill="#666666">getent hosts &lt;name&gt;</text><rect x="330" y="422" width="500" height="40" rx="6" fill="#F5F5F5" stroke="#666666" stroke-width="1"/><text x="345" y="447" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">No → /etc/resolv.conf / DNS server</text><line x1="290" y1="442" x2="326" y2="442" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><text x="40" y="510" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="12.5"  fill="#666666">If using systemd-networkd or NetworkManager, check: journalctl -u systemd-networkd -b</text></svg>
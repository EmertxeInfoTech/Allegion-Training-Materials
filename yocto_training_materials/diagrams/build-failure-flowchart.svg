<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#CC0066"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#663399"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#CC0066"/><stop offset="1" stop-color="#663399"/></linearGradient></defs><rect width="900" height="460" fill="#FFFFFF"/><text x="40" y="45" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#CC0066">Build Failure Diagnosis</text><text x="40" y="70" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">Identify the failing task, then follow the path.</text><rect x="40" y="100" width="150" height="44" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="115.0" y="127.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">do_fetch</text><line x1="190" y1="122" x2="208" y2="122" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="208" y="100" width="150" height="44" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="283.0" y="127.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">do_patch</text><line x1="358" y1="122" x2="376" y2="122" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="376" y="100" width="150" height="44" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="451.0" y="127.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">do_configure</text><line x1="526" y1="122" x2="544" y2="122" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="544" y="100" width="150" height="44" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="619.0" y="127.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">do_compile</text><line x1="694" y1="122" x2="712" y2="122" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="712" y="100" width="150" height="44" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="787.0" y="127.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">do_package</text><rect x="40" y="180" width="150" height="64" rx="6" fill="#FFFFFF" stroke="#666666" stroke-width="1.5"/><text x="115" y="206" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">404 / timeout /</text><text x="115" y="224" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">checksum</text><line x1="115" y1="144" x2="115" y2="178" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="40" y="270" width="150" height="64" rx="6" fill="#F5F5F5" stroke="#CC0066" stroke-width="1.5"/><text x="115" y="296" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">Check URL + network;</text><text x="115" y="314" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">paste correct sha256</text><line x1="115" y1="244" x2="115" y2="268" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="208" y="180" width="150" height="64" rx="6" fill="#FFFFFF" stroke="#666666" stroke-width="1.5"/><text x="283" y="206" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">patch hunk</text><text x="283" y="224" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">FAILED</text><line x1="283" y1="144" x2="283" y2="178" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="208" y="270" width="150" height="64" rx="6" fill="#F5F5F5" stroke="#CC0066" stroke-width="1.5"/><text x="283" y="296" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">devshell + git apply</text><text x="283" y="314" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">--3way; regenerate</text><line x1="283" y1="244" x2="283" y2="268" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="376" y="180" width="150" height="64" rx="6" fill="#FFFFFF" stroke="#666666" stroke-width="1.5"/><text x="451" y="206" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">missing dep /</text><text x="451" y="224" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">feature</text><line x1="451" y1="144" x2="451" y2="178" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="376" y="270" width="150" height="64" rx="6" fill="#F5F5F5" stroke="#CC0066" stroke-width="1.5"/><text x="451" y="296" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">Add DEPENDS;</text><text x="451" y="314" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">check PACKAGECONFIG</text><line x1="451" y1="244" x2="451" y2="268" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="544" y="180" width="150" height="64" rx="6" fill="#FFFFFF" stroke="#666666" stroke-width="1.5"/><text x="619" y="206" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">header not found</text><text x="619" y="224" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">/ link error</text><line x1="619" y1="144" x2="619" y2="178" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="544" y="270" width="150" height="64" rx="6" fill="#F5F5F5" stroke="#CC0066" stroke-width="1.5"/><text x="619" y="296" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">Add DEPENDS;</text><text x="619" y="314" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">check cross flags</text><line x1="619" y1="244" x2="619" y2="268" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="712" y="180" width="150" height="64" rx="6" fill="#FFFFFF" stroke="#666666" stroke-width="1.5"/><text x="787" y="206" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">installed but</text><text x="787" y="224" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="12"  fill="#333333">not shipped</text><line x1="787" y1="144" x2="787" y2="178" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="712" y="270" width="150" height="64" rx="6" fill="#F5F5F5" stroke="#CC0066" stroke-width="1.5"/><text x="787" y="296" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">Add file to</text><text x="787" y="314" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11.5"  fill="#663399">FILES:${PN}</text><line x1="787" y1="244" x2="787" y2="268" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><text x="40" y="372" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#CC0066">Universal flow:</text><text x="40" y="396" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="12.5"  fill="#333333">1. Read the error line (names task + log path)   2. less the log.do_&lt;task&gt;   3. Read run.do_&lt;task&gt;   4. devshell to reproduce   5. fix, then bitbake -c &lt;task&gt; -f</text><text x="40" y="430" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="12.5"  fill="#666666">Transient (network)? just retry.   Corrupted state? bitbake &lt;recipe&gt; -c cleansstate, then rebuild.</text></svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="510" viewBox="0 0 900 510"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#CC0066"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#663399"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#CC0066"/><stop offset="1" stop-color="#663399"/></linearGradient></defs><rect width="900" height="510" fill="#FFFFFF"/><text x="40" y="45" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#CC0066">Filesystem Choice</text><text x="40" y="70" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">Pick per partition, by how it is used.</text><rect x="330" y="100" width="240" height="50" rx="8" fill="url(#brand)" stroke="#663399" stroke-width="2"/><text x="450.0" y="130.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">What is this partition for?</text><line x1="390" y1="150" x2="200" y2="195" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="70" y="200" width="260" height="50" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="200.0" y="230.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#CC0066">Writable root or data</text><line x1="200" y1="250" x2="200" y2="295" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="70" y="300" width="260" height="56" rx="8" fill="#FFFFFF" stroke="#CC0066" stroke-width="2"/><text x="200.0" y="324.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333">ext4</text><text x="200.0" y="342.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#666666">stable, journaled, resizable</text><line x1="200" y1="356" x2="200" y2="400" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="70" y="405" width="260" height="56" rx="8" fill="#F5F5F5" stroke="#666666" stroke-width="2"/><text x="200.0" y="429.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">f2fs (if flash wear matters)</text><text x="200.0" y="447.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#666666">better wear-leveling</text><line x1="510" y1="150" x2="700" y2="195" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="570" y="200" width="280" height="50" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="710.0" y="230.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#663399">Read-only root</text><line x1="710" y1="250" x2="710" y2="295" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="570" y="300" width="280" height="56" rx="8" fill="#FFFFFF" stroke="#663399" stroke-width="2"/><text x="710.0" y="324.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="16" font-weight="bold" fill="#333333">squashfs</text><text x="710.0" y="342.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" fill="#666666">compressed, tamper-evident</text><line x1="710" y1="356" x2="710" y2="400" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="570" y="405" width="280" height="56" rx="8" fill="#F5F5F5" stroke="#666666" stroke-width="2"/><text x="710.0" y="429.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13" font-weight="bold" fill="#333333">erofs (newer, smaller)</text><text x="710.0" y="447.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="10" fill="#666666">modern read-only option</text><text x="450" y="490" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">Read-only root needs a writable overlay (overlayfs) for state. boot partition is almost always vfat.</text></svg>
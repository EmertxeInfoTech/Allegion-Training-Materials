<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="410" viewBox="0 0 900 410"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#CC0066"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#663399"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#CC0066"/><stop offset="1" stop-color="#663399"/></linearGradient></defs><rect width="900" height="410" fill="#FFFFFF"/><text x="40" y="45" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#CC0066">A/B Update Flow</text><text x="40" y="70" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">Atomic, power-fail-safe updates with automatic rollback.</text><rect x="40" y="110" width="125" height="64" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="102.5" y="138.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Slot A booted</text><text x="102.5" y="156.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">active + good</text><line x1="165" y1="142" x2="173" y2="142" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="173" y="110" width="125" height="64" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="235.5" y="138.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Download</text><text x="235.5" y="156.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">to Slot B</text><line x1="298" y1="142" x2="306" y2="142" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="306" y="110" width="125" height="64" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="368.5" y="138.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Verify</text><text x="368.5" y="156.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">checksum/signature</text><line x1="431" y1="142" x2="439" y2="142" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="439" y="110" width="125" height="64" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="501.5" y="138.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Switch</text><text x="501.5" y="156.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">set boot = B</text><line x1="564" y1="142" x2="572" y2="142" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="572" y="110" width="125" height="64" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="634.5" y="138.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Reboot</text><text x="634.5" y="156.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">into Slot B</text><line x1="697" y1="142" x2="705" y2="142" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="705" y="110" width="125" height="64" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="767.5" y="138.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Mark good</text><text x="767.5" y="156.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">commit Slot B</text><text x="40" y="220" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#CC0066">Failure handling (why A/B is safe):</text><text x="40" y="248" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Power loss mid-download or mid-flash → Slot A still boots; no harm.</text><text x="40" y="274" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Verify fails → don't switch; stay on Slot A.</text><text x="40" y="300" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Slot B fails to boot → bootloader boot-count hits 0 → auto-revert to Slot A.</text><text x="40" y="326" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Slot B boots OK → userspace 'mark good' resets the counter; B becomes active.</text><text x="40" y="380" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="12.5"  fill="#666666">Tools: RAUC, Mender, SWUpdate, OSTree. Needs 2x rootfs space + a data partition that survives updates.</text></svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="475" viewBox="0 0 900 475"><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#CC0066"/></marker><marker id="ahp" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#663399"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#CC0066"/><stop offset="1" stop-color="#663399"/></linearGradient></defs><rect width="900" height="475" fill="#FFFFFF"/><text x="40" y="45" font-family="Calibri, Arial, sans-serif" font-size="22" font-weight="bold" fill="#CC0066">Boot Flow</text><text x="40" y="70" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#666666">From power-on to login. If boot fails, identify the stage — the fix lives there.</text><rect x="40" y="120" width="95" height="70" rx="8" fill="#F5F5F5" stroke="#666666" stroke-width="2"/><text x="87.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Power on</text><text x="87.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">reset vector</text><line x1="135" y1="155" x2="143" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="143" y="120" width="95" height="70" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="190.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">BootROM</text><text x="190.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">vendor stage-0</text><line x1="238" y1="155" x2="246" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="246" y="120" width="95" height="70" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="293.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">SPL</text><text x="293.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">init DRAM</text><line x1="341" y1="155" x2="349" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="349" y="120" width="95" height="70" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="396.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">U-Boot</text><text x="396.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">load kernel+DTB</text><line x1="444" y1="155" x2="452" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="452" y="120" width="95" height="70" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="499.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">Kernel</text><text x="499.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">init hardware</text><line x1="547" y1="155" x2="555" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="555" y="120" width="95" height="70" rx="8" fill="#FCE4EC" stroke="#CC0066" stroke-width="2"/><text x="602.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">initramfs</text><text x="602.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">mount rootfs</text><line x1="650" y1="155" x2="658" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="658" y="120" width="95" height="70" rx="8" fill="#E9D8F0" stroke="#663399" stroke-width="2"/><text x="705.5" y="151.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#333333">systemd</text><text x="705.5" y="169.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">start services</text><line x1="753" y1="155" x2="761" y2="155" stroke="#CC0066" stroke-width="2.5" marker-end="url(#ah)"/><rect x="40" y="230" width="95" height="70" rx="8" fill="url(#brand)" stroke="#663399" stroke-width="2"/><text x="87.5" y="261.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">login</text><text x="87.5" y="279.0" text-anchor="middle" font-family="Calibri, Arial, sans-serif" font-size="11" fill="#666666">ready</text><text x="40" y="280" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="14" font-weight="bold" fill="#CC0066">Common failures by stage:</text><text x="40" y="308" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• U-Boot prompt stuck → kernel/DTB path or bootargs wrong</text><text x="40" y="332" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Kernel panic on mount root → root=, rootfstype, or rootwait wrong</text><text x="40" y="356" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Black screen, no serial → console= argument or earlycon</text><text x="40" y="380" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• Boots, no network → driver/MAC/DHCP; check dmesg + journalctl</text><text x="40" y="404" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="13"  fill="#333333">• systemd hangs → failed dependency; try systemd.debug-shell=1</text><text x="40" y="450" text-anchor="start" font-family="Calibri, Arial, sans-serif" font-size="12.5"  fill="#666666">Verify a clean boot: systemctl --failed (none) • dmesg --level=err,warn (empty) • systemd-analyze (boot time)</text></svg>